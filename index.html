<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Meloni"/>
<meta name="theme-color" content="#0F1E33"/>
<title>Meloni Cash Flow</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg1:#1A2E4A;--bg2:#0F1E33;--bg3:#0A1525;
  --card:#1E3352;--edge:#2E4D7A;
  --cream:#F0EAD6;--green:#2ECC71;--lime:#A8E063;
  --teal:#1ABC9C;--orange:#E8892A;--orangeL:#F5AB58;
  --red:#E74C3C;--purple:#9B59B6;--purpleL:#C39BD3;
  --line:#2A4068;--muted:#7FA8D4;--white:#fff;
  --hf:'Trebuchet MS',Helvetica,Arial,sans-serif;
  --mf:'Courier New',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg3)}
body{
  font-family:var(--hf);color:var(--cream);
  background:radial-gradient(130% 80% at 50% -5%,#1E3D6E 0%,var(--bg1) 40%,var(--bg2) 75%,var(--bg3) 100%);
  display:flex;flex-direction:column;
}
#app{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom)+70px)}
.inner{max-width:480px;margin:0 auto;padding:24px 14px 0}

/* Glass card */
.glass{
  background:linear-gradient(155deg,var(--card) 0%,#152844 100%);
  border:1px solid var(--edge);
  border-radius:14px;
  box-shadow:0 8px 28px -12px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.07);
  position:relative;overflow:hidden;
}
.glass::before{content:"";position:absolute;top:0;left:0;right:0;height:38%;
  background:linear-gradient(180deg,rgba(255,255,255,.07),transparent);pointer-events:none}

/* Buttons */
.btn-green{
  width:100%;background:linear-gradient(135deg,var(--lime),var(--green));
  color:var(--bg3);border:none;border-radius:12px;padding:14px;
  font-size:16px;font-weight:800;font-family:var(--hf);letter-spacing:.04em;
  display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;
  box-shadow:0 6px 20px -6px rgba(46,204,113,.6);
  position:relative;overflow:hidden;transition:transform .13s;
}
.btn-green:active{transform:scale(.97)}
.btn-orange{background:linear-gradient(135deg,var(--orangeL),var(--orange));color:#1A0800;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:800;font-family:var(--hf);cursor:pointer;flex:2}
.btn-purple{background:linear-gradient(135deg,var(--purpleL),var(--purple));color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:800;font-family:var(--hf);cursor:pointer;flex:2}
.btn-skip{background:none;border-radius:10px;padding:12px;font-size:13px;font-weight:700;font-family:var(--hf);cursor:pointer;flex:1}
.btn-back{background:none;border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:12px;font-size:13px;font-weight:700;font-family:var(--hf);cursor:pointer;flex:1}
.btn-cancel{background:none;border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:12px;font-size:14px;font-weight:700;font-family:var(--hf);cursor:pointer;flex:1}
.btn-row{display:flex;gap:8px;margin-top:12px}
.icon-btn{background:none;border:1px solid var(--edge);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--cream);flex-shrink:0}

/* Inputs */
label.lbl{display:block;font-family:var(--mf);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;margin-top:10px}
input[type=text],input[type=number],input[type=date]{
  width:100%;border:1px solid var(--edge);border-radius:9px;
  padding:11px 11px;font-size:15px;font-family:var(--hf);
  background:#152844;color:var(--cream);outline:none;
  transition:border-color .15s,box-shadow .15s;
}
input:focus{border-color:var(--green)!important;box-shadow:0 0 0 3px rgba(46,204,113,.22)}
input::placeholder{color:var(--muted);opacity:.65}
.amt-wrap{position:relative}
.amt-prefix{position:absolute;left:11px;top:11px;color:var(--muted);font-family:var(--mf)}
.amt-wrap input{padding-left:24px}

/* Progress bar */
.progress{display:flex;gap:6px;margin-bottom:16px}
.progress-seg{flex:1;height:3px;border-radius:2px;background:var(--line);transition:background .3s}
.progress-seg.done{background:var(--green)}
.progress-seg.active{background:var(--lime)}

/* Category chips */
.cat-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
.cat-chip{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;font-family:var(--hf);cursor:pointer;border:1px solid var(--line);background:transparent;color:var(--muted);transition:all .15s}
.cat-chip.sel{border-color:var(--chip-color);background:var(--chip-bg);color:var(--chip-color)}

/* Summary cards */
.cards3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:10px}
.sm-card{border-radius:12px;padding:11px 9px;cursor:pointer;transition:transform .12s;
  background:linear-gradient(155deg,#1E3352,#152844);border:1px solid var(--edge)}
.sm-card:active{transform:scale(.95)}
.sm-card.accent{border-color:var(--ac-color);background:linear-gradient(145deg,var(--ac-bg1),var(--ac-bg2))}
.sm-card .card-lbl{font-family:var(--mf);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.sm-card .card-val{font-size:15px;font-weight:800}

/* Section label */
.sec-lbl{font-family:var(--mf);font-size:10px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:8px}

/* Modal */
#modal-bg{display:none;position:fixed;inset:0;background:rgba(5,10,20,.78);z-index:1000;align-items:flex-end;justify-content:center}
#modal-bg.open{display:flex}
#modal{width:100%;max-width:480px;max-height:90vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:18px 18px 32px;
  background:linear-gradient(155deg,var(--card) 0%,#152844 100%);border:1px solid var(--edge);
  animation:slideUp .26s ease both}
@keyframes slideUp{from{opacity:0;transform:translateY(44px)}to{opacity:1;transform:translateY(0)}}

/* Job log rows */
.job-row{padding:12px 14px;border-bottom:1px solid var(--line)}
.job-row:last-child{border-bottom:none}
.job-meta{font-family:var(--mf);font-size:10px;color:var(--muted);margin-bottom:2px}
.job-desc{font-size:14px;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-pill{display:inline-block;margin-top:3px;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700}
.job-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.job-income{font-size:13px;font-weight:800;color:var(--lime);text-align:right}
.job-profit{font-size:11px;font-weight:700;text-align:right}
.del-btn{background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;display:flex}
.job-costs{display:flex;gap:10px;margin-top:5px;font-family:var(--mf);font-size:10px}

/* Monthly table */
.month-grid{display:grid;grid-template-columns:auto 1fr 1fr 1fr 1fr;gap:0}
.month-hdr{font-family:var(--mf);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:8px 14px;border-bottom:1px solid var(--line)}
.month-cell{font-size:12px;padding:10px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center}
.month-cell.right{justify-content:flex-end}
.month-row-last .month-cell{border-bottom:none}

/* All-time strip */
.at-strip{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;padding:14px 16px}
.at-item{text-align:center}
.at-lbl{font-family:var(--mf);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.at-val{font-size:13px;font-weight:800}

/* Money rain */
.rain-piece{position:fixed;pointer-events:none;display:flex;align-items:center;justify-content:center;font-family:var(--mf);font-weight:800;animation:fall var(--dur)s linear var(--delay)s forwards;top:-120px;z-index:9999}
@keyframes fall{0%{transform:translateY(0) rotate(0deg);opacity:0}8%{opacity:1}100%{transform:translateY(115vh) rotate(var(--spin));opacity:.9}}

/* Nav bar */
#nav{position:fixed;bottom:0;left:0;right:0;height:calc(60px + env(safe-area-inset-bottom));background:rgba(10,21,37,.95);border-top:1px solid var(--edge);display:flex;align-items:center;justify-content:space-around;padding-bottom:env(safe-area-inset-bottom);backdrop-filter:blur(10px);z-index:500}
.nav-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 16px;color:var(--muted);font-family:var(--mf);font-size:9px;letter-spacing:.08em;text-transform:uppercase;transition:color .15s}
.nav-btn.active{color:var(--lime)}
.nav-icon{font-size:20px;line-height:1}

/* Chart container */
.chart-wrap{height:210px;margin-bottom:4px;position:relative}

/* Confirm rows */
.c-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px}
.c-row.big{font-size:15px}
.c-divider{height:1px;background:var(--line);margin:10px 0}

/* Step header */
.step-hdr{margin-bottom:12px}
.step-hdr-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-family:var(--mf);font-size:11px;letter-spacing:.14em;text-transform:uppercase}
.step-hdr-sub{font-size:13px;color:var(--muted)}

/* Form panel */
#form-panel{display:none}
#form-panel.open{display:block}

/* Views */
.view{display:none}
.view.active{display:block}

/* Modal header */
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.modal-title-wrap{display:flex;align-items:center;gap:8px}
.modal-sub{font-family:var(--mf);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.modal-title{font-size:18px;font-weight:800}

/* Period summary tiles */
.period-tiles{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.period-tile{background:rgba(255,255,255,.05);border-radius:10px;padding:10px 8px;text-align:center}
.period-tile-lbl{font-family:var(--mf);font-size:8px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.period-tile-val{font-weight:800;font-size:13px}

/* Job detail expand */
.job-detail{padding:0 14px 14px;background:rgba(0,0,0,.15)}
.job-detail-inner{background:rgba(255,255,255,.04);border-radius:10px;padding:10px 12px}
.detail-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0}
.detail-divider{height:1px;background:var(--line);margin:8px 0}
.detail-total{display:flex;justify-content:space-between;font-size:13px}

/* Sync badge */
#sync-badge{display:flex;align-items:center;justify-content:center;gap:6px;font-family:var(--mf);font-size:10px;margin-bottom:8px}

/* Error */
.err{color:#FF6B5B;font-size:12px;margin-top:6px}

/* By category table */
.cat-table-row{display:grid;grid-template-columns:1fr auto auto auto;padding:10px 14px;border-bottom:1px solid var(--line);align-items:center;gap:8px}
.cat-table-row:last-child{border-bottom:none}
.cat-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;margin-right:7px}

@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spinning{animation:spin 1s linear infinite;display:inline-block}
</style>
</head>
<body>

<div id="app">
<div class="inner">

  <!-- HEADER -->
  <div style="text-align:center;margin-bottom:20px">
    <h1 style="font-size:42px;line-height:1.05;margin:8px 0 4px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;background:linear-gradient(150deg,#fff 0%,#A8E063 60%,#2ECC71 100%);-webkit-background-clip:text;background-clip:text;color:transparent">Meloni<br>Maintenance</h1>
    <div style="font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">&amp; Property Solutions</div>
    <div style="font-size:13px;font-style:italic;letter-spacing:.16em;text-transform:uppercase;color:var(--lime);margin-bottom:10px">Cash Flow Tracker</div>
    <div id="sync-badge"><span id="sync-icon">💾</span><span id="sync-text" style="color:var(--green)">Data saved on this device</span></div>
  </div>

  <!-- VIEWS -->
  <!-- ═══ DASHBOARD VIEW ═══ -->
  <div id="view-dash" class="view active">

    <button class="btn-green" onclick="openForm()" style="margin-bottom:16px">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Log a job
    </button>

    <!-- FORM PANEL -->
    <div id="form-panel" class="glass" style="padding:20px;margin-bottom:18px;border-radius:16px">
      <div class="progress" id="progress-bar">
        <div class="progress-seg" id="p0"></div>
        <div class="progress-seg" id="p1"></div>
        <div class="progress-seg" id="p2"></div>
      </div>
      <div id="step-income"></div>
      <div id="step-materials" style="display:none"></div>
      <div id="step-labor" style="display:none"></div>
      <div id="step-confirm" style="display:none"></div>
    </div>

    <!-- SUMMARY CARDS -->
    <div id="cards-section"></div>

    <div style="text-align:center;font-size:11px;color:var(--muted);font-style:italic;margin-bottom:22px">Tap any card for charts &amp; breakdown</div>

    <!-- ALL TIME -->
    <div class="glass at-strip" style="margin-bottom:22px" id="at-strip"></div>

    <!-- MONTHLY -->
    <div id="monthly-section"></div>

  </div><!-- /dash -->

  <!-- ═══ JOB LOG VIEW ═══ -->
  <div id="view-jobs" class="view">
    <div class="sec-lbl" style="color:var(--lime)">Job log</div>
    <div id="job-log" class="glass" style="border-radius:14px;overflow:hidden"></div>
  </div>

</div><!-- /inner -->
</div><!-- /app -->

<!-- NAV BAR -->
<div id="nav">
  <button class="nav-btn active" id="nav-dash" onclick="showView('dash')">
    <span class="nav-icon">📊</span>Dashboard
  </button>
  <button class="nav-btn" id="nav-jobs" onclick="showView('jobs')">
    <span class="nav-icon">📋</span>Job Log
  </button>
</div>

<!-- MODAL -->
<div id="modal-bg" onclick="closeModal()">
  <div id="modal" onclick="event.stopPropagation()">
    <div id="modal-content"></div>
  </div>
</div>

<!-- RAIN CONTAINER -->
<div id="rain" style="position:fixed;inset:0;pointer-events:none;z-index:9998;overflow:hidden"></div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const STORE_KEY = 'meloni-cf-v3';
let jobs = [];

function loadJobs(){
  try{ const r=localStorage.getItem(STORE_KEY); if(r) jobs=JSON.parse(r); }catch(e){}
}
function saveJobs(){
  try{ localStorage.setItem(STORE_KEY,JSON.stringify(jobs)); showSyncOk(); }catch(e){ showSyncErr(); }
}
function showSyncOk(){
  document.getElementById('sync-icon').textContent='💾';
  document.getElementById('sync-text').textContent='Data saved on this device';
  document.getElementById('sync-text').style.color='var(--green)';
}
function showSyncErr(){
  document.getElementById('sync-icon').textContent='⚠️';
  document.getElementById('sync-text').textContent='Save failed — storage full?';
  document.getElementById('sync-text').style.color='var(--orange)';
}

// ─── CATEGORIES ──────────────────────────────────────────────────────────────
const CATS=[
  {id:'mowing',     label:'Mowing',              color:'#2ECC71'},
  {id:'landscaping',label:'Landscaping',          color:'#1ABC9C'},
  {id:'maintenance',label:'Property Maintenance', color:'#3498DB'},
  {id:'pressure',   label:'Pressure Cleaning',    color:'#5DADE2'},
  {id:'handyman',   label:'Handyman',             color:'#F39C12'},
  {id:'other',      label:'Other',                color:'#95A5A6'},
];
function catById(id){ return CATS.find(c=>c.id===id)||CATS[CATS.length-1]; }

// ─── FORMAT ──────────────────────────────────────────────────────────────────
function fmt(n){
  return new Intl.NumberFormat('en-AU',{style:'currency',currency:'AUD',minimumFractionDigits:2}).format(n||0);
}
function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmtDate(s){ return new Date(s+'T00:00:00').toLocaleDateString('en-AU',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtDateLong(s){ return new Date(s+'T00:00:00').toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short',year:'numeric'}); }

// ─── DATE HELPERS ─────────────────────────────────────────────────────────────
function startOfWeek(d){
  const dt=new Date(d); dt.setDate(dt.getDate()-((dt.getDay()+6)%7)); dt.setHours(0,0,0,0); return dt;
}
function startOfFY(d){
  const y=d.getFullYear(),m=d.getMonth();
  return m<6?new Date(y-1,6,1):new Date(y,6,1);
}
function fyLabel(d){
  const s=startOfFY(d); return `FY ${s.getFullYear()}–${String(s.getFullYear()+1).slice(2)}`;
}
const MONTHS_S=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS_F=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_S=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

function sumField(arr,start,end,field){
  return arr.reduce((a,j)=>{ const d=new Date(j.date+'T00:00:00'); return d>=start&&d<end?a+(j[field]||0):a; },0);
}
function jobsInRange(arr,start,end){
  return arr.filter(j=>{ const d=new Date(j.date+'T00:00:00'); return d>=start&&d<end; }).sort((a,b)=>a.date.localeCompare(b.date));
}

// ─── VIEWS ────────────────────────────────────────────────────────────────────
function showView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('nav-'+v).classList.add('active');
  if(v==='jobs') renderJobLog();
  if(v==='dash') renderDash();
}

// ─── FORM ─────────────────────────────────────────────────────────────────────
let formData={};
let currentStep='income';

function openForm(){
  formData={ date:todayStr(), desc:'', income:'', materials:'', laborAmt:'', laborTag:'', category:'' };
  currentStep='income';
  document.getElementById('form-panel').classList.add('open');
  document.querySelector('.btn-green').style.display='none';
  renderStep();
}
function closeForm(){
  document.getElementById('form-panel').classList.remove('open');
  document.querySelector('.btn-green').style.display='flex';
  document.getElementById('step-income').innerHTML='';
  document.getElementById('step-materials').innerHTML='';
  document.getElementById('step-labor').innerHTML='';
  document.getElementById('step-confirm').innerHTML='';
}

function setProgress(step){
  const steps=['income','materials','labor'];
  const idx=steps.indexOf(step);
  steps.forEach((s,i)=>{
    const el=document.getElementById('p'+i);
    el.className='progress-seg'+(i<idx?' done':i===idx?' active':'');
  });
}

function renderStep(){
  ['income','materials','labor','confirm'].forEach(s=>{ document.getElementById('step-'+s).style.display='none'; });
  document.getElementById('step-'+currentStep).style.display='block';
  setProgress(currentStep);
  if(currentStep==='income') renderStepIncome();
  if(currentStep==='materials') renderStepMaterials();
  if(currentStep==='labor') renderStepLabor();
  if(currentStep==='confirm') renderStepConfirm();
}

function renderStepIncome(){
  const el=document.getElementById('step-income');
  el.innerHTML=`
    <label class="lbl">Job description</label>
    <input type="text" id="f-desc" placeholder="e.g. Smith St mow &amp; edge" value="${escHtml(formData.desc)}">
    <label class="lbl">Category</label>
    <div class="cat-grid">${CATS.map(c=>`<button class="cat-chip${formData.category===c.id?' sel':''}" style="--chip-color:${c.color};--chip-bg:${c.color}33" onclick="selCat('${c.id}')">${c.label}</button>`).join('')}</div>
    <label class="lbl">Date</label>
    <input type="date" id="f-date" value="${formData.date}">
    <label class="lbl">Income charged to client</label>
    <div class="amt-wrap"><span class="amt-prefix">$</span><input type="number" inputmode="decimal" id="f-income" placeholder="0.00" value="${formData.income}"></div>
    <div id="income-err" class="err" style="display:none"></div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeForm()">Cancel</button>
      <button class="btn-green" style="flex:2;border-radius:10px;padding:12px;font-size:14px" onclick="nextFromIncome()">Next: Materials →</button>
    </div>`;
}
function selCat(id){ formData.category=id; renderStepIncome(); }

function nextFromIncome(){
  formData.desc=document.getElementById('f-desc').value;
  formData.date=document.getElementById('f-date').value;
  formData.income=document.getElementById('f-income').value;
  const v=parseFloat(formData.income);
  if(!v||v<=0){ document.getElementById('income-err').textContent='Enter the income amount.'; document.getElementById('income-err').style.display='block'; return; }
  currentStep='materials'; renderStep();
}

function renderStepMaterials(){
  const el=document.getElementById('step-materials');
  el.innerHTML=`
    <div class="step-hdr">
      <div class="step-hdr-top" style="color:var(--orange)">📦 Materials cost</div>
      <div class="step-hdr-sub">How much did you spend on materials?</div>
    </div>
    <div class="amt-wrap"><span class="amt-prefix" style="color:var(--orange)">$</span><input type="number" inputmode="decimal" id="f-mat" placeholder="0.00" value="${formData.materials}" style="border-color:var(--orange)30"></div>

function skipMaterials(){ formData.materials=''; currentStep='labor'; renderStep(); }
function nextFromMaterials(){ formData.materials=document.getElementById('f-mat').value; currentStep='labor'; renderStep(); }

function renderStepLabor(){

function nextFromLabor(){ formData.laborAmt=document.getElementById('f-lab').value; formData.laborTag=document.getElementById('f-tag').value; currentStep='confirm'; renderStep(); }

function renderStepConfirm(){
  const inc=parseFloat(formData.income)||0;

    ${cat?`<div style="display:inline-block;padding:3px 10px;border-radius:16px;font-size:11px;font-weight:700;background:${cat.color}25;border:1px solid ${cat.color}55;color:${cat.color};margin-bottom:10px">${cat.label}</div>`:''}
    <div style="font-size:12px;font-family:var(--mf);color:var(--muted);margin-bottom:12px">${fmtDateLong(formData.date)}</div>

function saveJob(){
  const job={
    id:Date.now().toString(),
    date:formData.date, desc:formData.desc.trim(), category:formData.category,
    income:parseFloat(formData.income)||0,
    materials:parseFloat(formData.materials)||0,
    labor:parseFloat(formData.laborAmt)||0,
    laborTag:formData.laborTag.trim(),
  };
  jobs=[job,...jobs].sort((a,b)=>b.date.localeCompare(a.date));
  saveJobs();
  closeForm();
  renderDash();
  launchRain();
}

function deleteJob(id){
  if(!confirm('Delete this job?')) return;
  jobs=jobs.filter(j=>j.id!==id);
  saveJobs();
  renderDash();
  renderJobLog();
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function renderDash(){
  renderCards();
  renderAllTime();
  renderMonthly();
}

function getTotals(){
  const now=new Date();
  const ws=startOfWeek(now);
  const ms=new Date(now.getFullYear(),now.getMonth(),1);
  const fys=startOfFY(now);
  let wI=0,wM=0,wL=0,mI=0,mM=0,mL=0,fyI=0,fyM=0,fyL=0,atI=0,atM=0,atL=0;
  const monthly={};
  jobs.forEach(j=>{
    const d=new Date(j.date+'T00:00:00');
    atI+=j.income||0; atM+=j.materials||0; atL+=j.labor||0;
    if(d>=fys){fyI+=j.income||0;fyM+=j.materials||0;fyL+=j.labor||0;}
    if(d>=ms){mI+=j.income||0;mM+=j.materials||0;mL+=j.labor||0;}
    if(d>=ws){wI+=j.income||0;wM+=j.materials||0;wL+=j.labor||0;}
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    monthly[key]=monthly[key]||{income:0,materials:0,labor:0};
    monthly[key].income+=j.income||0; monthly[key].materials+=j.materials||0; monthly[key].labor+=j.labor||0;
  });
  return {wI,wM,wL,mI,mM,mL,fyI,fyM,fyL,atI,atM,atL,
    monthlyList:Object.entries(monthly).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,12)};
}

function renderCards(){
  const t=getTotals();
  const rows=[
    {label:'Income',   vals:[t.wI,t.mI,t.fyI], color:'var(--lime)'},
    {label:'Materials',vals:[t.wM,t.mM,t.fyM], color:'var(--orange)'},
    {label:'Labor',    vals:[t.wL,t.mL,t.fyL], color:'var(--purpleL)'},
    {label:'Profit',   vals:[t.wI-t.wM-t.wL,t.mI-t.mM-t.mL,t.fyI-t.fyM-t.fyL], color:'var(--teal)'},
  ];
  const sections=['week','month','year'];
  const sLabels=['This week','This month','This FY'];
  let html='';
  rows.forEach(r=>{
    html+=`<div class="sec-lbl" style="color:${r.color}">${r.label}</div>`;
    html+=`<div class="cards3" style="margin-bottom:10px">`;
    r.vals.forEach((v,i)=>{
      const accent=i===2;
      html+=`<div class="sm-card${accent?' accent':''}" style="${accent?`--ac-color:${r.color};--ac-bg1:${r.color}33;--ac-bg2:${r.color}22`:''}" onclick="openModal('${sections[i]}')">
        <div class="card-lbl">${sLabels[i]}</div>
        <div class="card-val" style="color:${r.color}">${fmt(v)}</div>
      </div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('cards-section').innerHTML=html;
}

function renderAllTime(){
  const t=getTotals();
  const items=[['All-time in',t.atI,'var(--lime)'],['Materials',t.atM,'var(--orange)'],['Labor',t.atL,'var(--purpleL)'],['Profit',t.atI-t.atM-t.atL,'var(--teal)']];
  document.getElementById('at-strip').innerHTML=items.map(([l,v,c])=>`<div class="at-item"><div class="at-lbl">${l}</div><div class="at-val" style="color:${c}">${fmt(v)}</div></div>`).join('');
}

function renderMonthly(){
  const t=getTotals();
  if(!t.monthlyList.length){ document.getElementById('monthly-section').innerHTML=''; return; }
  let html=`<div class="sec-lbl" style="color:var(--lime)">Monthly breakdown</div><div class="glass" style="border-radius:14px;overflow:hidden;margin-bottom:22px">`;
  html+=`<div class="month-grid">`;
  ['','Income','Mat.','Labor','Profit'].forEach((h,i)=>html+=`<div class="month-hdr" style="text-align:${i>0?'right':'left'}">${h}</div>`);
  html+=`</div>`;
  t.monthlyList.forEach(([key,val],idx)=>{
    const [y,m]=key.split('-');
    const name=new Date(Number(y),Number(m)-1,1).toLocaleString('en-AU',{month:'short',year:'numeric'});
    const profit=val.income-val.materials-val.labor;
    const last=idx===t.monthlyList.length-1?'month-row-last':'';
    html+=`<div class="month-grid ${last}">
      <div class="month-cell" style="font-size:13px">${name}</div>
      <div class="month-cell right" style="font-weight:700;color:var(--lime)">${fmt(val.income)}</div>
      <div class="month-cell right" style="color:var(--orange)">${val.materials>0?fmt(val.materials):'—'}</div>
      <div class="month-cell right" style="color:var(--purpleL)">${val.labor>0?fmt(val.labor):'—'}</div>
      <div class="month-cell right" style="font-weight:700;color:${profit>=0?'var(--teal)':'var(--red)'}">${fmt(profit)}</div>
    </div>`;
  });
  html+=`</div>`;
  document.getElementById('monthly-section').innerHTML=html;
}

// ─── MODAL (drill-down) ───────────────────────────────────────────────────────
let modalStack=[];
let activeChart=null;

function openModal(level){
  modalStack=[{level,refDate:new Date()}];
  renderModal();
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal(){
  document.getElementById('modal-bg').classList.remove('open');
  if(activeChart){activeChart.destroy();activeChart=null;}
  modalStack=[];
}
function modalBack(){
  modalStack.pop();
  renderModal();
}

function renderModal(){
  const {level,refDate}=modalStack[modalStack.length-1];
  let rangeStart,rangeEnd,title,chartData;

  if(level==='year'){
    rangeStart=startOfFY(refDate);
    rangeEnd=new Date(rangeStart.getFullYear()+1,rangeStart.getMonth(),1);
    title=fyLabel(refDate);
    const fyStart=startOfFY(refDate);
    chartData=Array.from({length:12},(_,i)=>{
      const s=new Date(fyStart.getFullYear(),fyStart.getMonth()+i,1);
      const e=new Date(fyStart.getFullYear(),fyStart.getMonth()+i+1,1);
      return {label:MONTHS_S[s.getMonth()],income:sumField(jobs,s,e,'income'),materials:sumField(jobs,s,e,'materials'),labor:sumField(jobs,s,e,'labor'),profit:sumField(jobs,s,e,'income')-sumField(jobs,s,e,'materials')-sumField(jobs,s,e,'labor'),start:s,end:e};
    });
  } else if(level==='month'){
    const y=refDate.getFullYear(),m=refDate.getMonth();
    rangeStart=new Date(y,m,1); rangeEnd=new Date(y,m+1,1);
    title=`${MONTHS_F[m]} ${y}`;
    const days=new Date(y,m+1,0).getDate();
    chartData=Array.from({length:days},(_,i)=>{
      const s=new Date(y,m,i+1),e=new Date(y,m,i+2);
      return {label:String(i+1),income:sumField(jobs,s,e,'income'),materials:sumField(jobs,s,e,'materials'),labor:sumField(jobs,s,e,'labor'),profit:sumField(jobs,s,e,'income')-sumField(jobs,s,e,'materials')-sumField(jobs,s,e,'labor'),start:s,end:e};
    });
  } else {
    rangeStart=startOfWeek(refDate);
    rangeEnd=new Date(rangeStart); rangeEnd.setDate(rangeEnd.getDate()+7);
    const last=new Date(rangeEnd); last.setDate(last.getDate()-1);
    title=`${fmtShort(rangeStart)} – ${fmtShort(last)}`;
    chartData=Array.from({length:7},(_,i)=>{
      const s=new Date(rangeStart); s.setDate(s.getDate()+i);
      const e=new Date(s); e.setDate(e.getDate()+1);
      return {label:DAYS_S[i],income:sumField(jobs,s,e,'income'),materials:sumField(jobs,s,e,'materials'),labor:sumField(jobs,s,e,'labor'),profit:sumField(jobs,s,e,'income')-sumField(jobs,s,e,'materials')-sumField(jobs,s,e,'labor'),start:s,end:e};
    });
  }

  const pJobs=jobsInRange(jobs,rangeStart,rangeEnd);
  const totIncome=pJobs.reduce((a,j)=>a+(j.income||0),0);
  const totMat=pJobs.reduce((a,j)=>a+(j.materials||0),0);
  const totLab=pJobs.reduce((a,j)=>a+(j.labor||0),0);
  const totProfit=totIncome-totMat-totLab;

  // category breakdown
  const catMap={};
  pJobs.forEach(j=>{ const k=j.category||'other'; catMap[k]=catMap[k]||{income:0,profit:0,count:0}; catMap[k].income+=j.income||0; catMap[k].profit+=(j.income||0)-(j.materials||0)-(j.labor||0); catMap[k].count++; });
  const catBreak=CATS.filter(c=>catMap[c.id]).map(c=>({...c,...catMap[c.id]})).sort((a,b)=>b.income-a.income);

  let html=`
    <div class="modal-hdr">
      <div class="modal-title-wrap">
        ${modalStack.length>1?`<button class="icon-btn" onclick="modalBack()">◀</button>`:''}
        <div><div class="modal-sub">${level==='year'?'Financial Year':level==='month'?'Month':'Week'}</div><div class="modal-title">${title}</div></div>
      </div>
      <button class="icon-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="period-tiles">
      <div class="period-tile"><div class="period-tile-lbl">Income</div><div class="period-tile-val" style="color:var(--lime)">${fmt(totIncome)}</div></div>
      <div class="period-tile"><div class="period-tile-lbl">Materials</div><div class="period-tile-val" style="color:var(--orange)">${fmt(totMat)}</div></div>
      <div class="period-tile"><div class="period-tile-lbl">Labor</div><div class="period-tile-val" style="color:var(--purpleL)">${fmt(totLab)}</div></div>
      <div class="period-tile"><div class="period-tile-lbl">Profit</div><div class="period-tile-val" style="color:${totProfit>=0?'var(--teal)':'var(--red)'}">${fmt(totProfit)}</div></div>
    </div>
    <div class="chart-wrap"><canvas id="modal-chart"></canvas></div>
    <div style="font-size:10px;color:var(--muted);text-align:center;margin-bottom:16px;font-style:italic">${level==='year'?'Tap a month bar to drill down':'Tap bars to see day detail'}</div>`;

  // By job type
  if(catBreak.length){
    html+=`<div class="sec-lbl" style="color:var(--lime)">By job type</div>
    <div class="glass" style="border-radius:12px;overflow:hidden;margin-bottom:16px">
      <div style="display:grid;grid-template-columns:1fr auto auto auto;padding:7px 14px;border-bottom:1px solid var(--line)">
        ${['Category','Jobs','Income','Profit'].map((h,i)=>`<div style="font-family:var(--mf);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-align:${i>0?'right':'left'}">${h}</div>`).join('')}
      </div>
      ${catBreak.map((c,i)=>`<div class="cat-table-row" style="${i===catBreak.length-1?'border-bottom:none':''}">
        <div style="display:flex;align-items:center"><span class="cat-dot" style="background:${c.color}"></span><span style="font-size:13px">${c.label}</span></div>
        <div style="font-size:12px;color:var(--muted);text-align:right">${c.count}</div>
        <div style="font-size:12px;font-weight:700;color:${c.color};text-align:right">${fmt(c.income)}</div>
        <div style="font-size:12px;font-weight:700;color:${c.profit>=0?'var(--teal)':'var(--red)'};text-align:right">${fmt(c.profit)}</div>
      </div>`).join('')}
    </div>`;
  }

  // Jobs list
  if(pJobs.length){
    html+=`<div class="sec-lbl" style="color:var(--lime)">Jobs this ${level==='year'?'FY':level} (${pJobs.length})</div>
    <div class="glass" style="border-radius:12px;overflow:hidden">
      ${pJobs.slice().reverse().map((j,i)=>{
        const profit=(j.income||0)-(j.materials||0)-(j.labor||0);
        const cat=j.category?catById(j.category):null;
        return `<div>
          <div onclick="toggleJobDetail('jd-${j.id}')" style="padding:11px 14px;display:flex;justify-content:space-between;align-items:center;gap:8px;cursor:pointer;border-bottom:${i===pJobs.length-1?'none':'1px solid var(--line)'}">
            <div style="min-width:0">
              <div style="font-family:var(--mf);font-size:9px;color:var(--muted)">${fmtDate(j.date)}</div>
              <div style="font-size:13px;color:var(--white);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(j.desc)||'Job'}</div>
              ${cat?`<span style="display:inline-block;margin-top:2px;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700;background:${cat.color}20;color:${cat.color}">${cat.label}</span>`:''}
            </div>
            <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
              <div style="text-align:right">
                <div style="font-size:13px;font-weight:800;color:var(--lime)">${fmt(j.income)}</div>
                <div style="font-size:11px;color:${profit>=0?'var(--teal)':'var(--red)'}">${fmt(profit)}</div>
              </div>
              <span style="color:var(--muted);font-size:12px">▼</span>
            </div>
          </div>
          <div id="jd-${j.id}" style="display:none" class="job-detail">
            <div class="job-detail-inner">
              ${j.income>0?`<div class="detail-row"><span style="color:var(--muted)">Income charged</span><span style="color:var(--lime);font-weight:700">${fmt(j.income)}</span></div>`:''}
              ${j.materials>0?`<div class="detail-row"><span style="color:var(--muted)">Materials cost</span><span style="color:var(--orange);font-weight:700">−${fmt(j.materials)}</span></div>`:''}
              ${j.labor>0?`<div class="detail-row"><span style="color:var(--muted)">Labor${j.laborTag?` (${escHtml(j.laborTag)})`:''}</span><span style="color:var(--purpleL);font-weight:700">−${fmt(j.labor)}</span></div>`:''}
              <div class="detail-divider"></div>
              <div class="detail-total"><span style="color:var(--cream);font-weight:700">Gross profit</span><span style="color:${profit>=0?'var(--teal)':'var(--red)'};font-weight:800">${fmt(profit)}</span></div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  // Store chartData for click handler
  window._chartData=chartData;
  window._modalLevel=level;

  document.getElementById('modal-content').innerHTML=html;

  // Build chart
  if(activeChart){activeChart.destroy();activeChart=null;}
  const ctx=document.getElementById('modal-chart').getContext('2d');
  activeChart=new Chart(ctx,{
    type:'bar',
    data:{
      labels:chartData.map(d=>d.label),
      datasets:[
        {label:'Income',   data:chartData.map(d=>d.income),   backgroundColor:'#A8E063bb',borderRadius:3},
        {label:'Materials',data:chartData.map(d=>d.materials),backgroundColor:'#E8892Abb',borderRadius:3},
        {label:'Labor',    data:chartData.map(d=>d.labor),    backgroundColor:'#9B59B6bb',borderRadius:3},
        {label:'Profit',   data:chartData.map(d=>d.profit),   backgroundColor:'#1ABC9Cbb',borderRadius:3},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      onClick:(e,els)=>{
        if(!els.length) return;
        const item=chartData[els[0].index];
        if(level==='year' && item.start){
          modalStack.push({level:'month',refDate:item.start});
          if(activeChart){activeChart.destroy();activeChart=null;}
          renderModal();
        }
      },
      plugins:{
        legend:{labels:{color:'#7FA8D4',font:{size:10},boxWidth:10}},
        tooltip:{
          callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmt(ctx.raw)}`},
          backgroundColor:'#1E3352',borderColor:'#2E4D7A',borderWidth:1,
          titleColor:'#F0EAD6',bodyColor:'#F0EAD6',
        }
      },
      scales:{
        x:{ticks:{color:'#7FA8D4',font:{size:9}},grid:{display:false}},
        y:{ticks:{color:'#7FA8D4',font:{size:9},callback:v=>`$${v}`},grid:{color:'#2A4068'}},
      }
    }
  });
}

function toggleJobDetail(id){
  const el=document.getElementById(id);
  if(el) el.style.display=el.style.display==='none'?'block':'none';
}

function fmtShort(d){ return d.toLocaleDateString('en-AU',{day:'numeric',month:'short'}); }

// ─── MONEY RAIN ───────────────────────────────────────────────────────────────
function launchRain(){
  const container=document.getElementById('rain');
  container.innerHTML='';
  const types=['coin','bill1','bill100'];
  for(let i=0;i<70;i++){
    const type=types[Math.floor(Math.random()*3)];
    const el=document.createElement('div');
    el.className='rain-piece';
    const left=Math.random()*100;
    const delay=Math.random()*1.1;
    const dur=2.2+Math.random()*1.8;
    const rotate=Math.random()*360;
    const spin=(Math.random()>.5?1:-1)*(180+Math.random()*360);
    const drift=(Math.random()-.5)*130;
    const scale=0.65+Math.random()*.5;
    el.style.cssText=`left:${left}%;margin-left:${drift}px;--dur:${dur};--delay:${delay}s;--spin:${rotate+spin}deg;transform:rotate(${rotate}deg) scale(${scale})`;
    if(type==='coin'){
      el.style.cssText+=`;width:32px;height:32px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#FFE9A8,#E8C03E 45%,#B8860B 100%);border:2px solid #8A6A12;font-size:13px;color:#7A5A0E;box-shadow:0 4px 12px rgba(0,0,0,.4)`;
      el.textContent='$';
    } else {
      const big=type==='bill100';
      el.style.cssText+=`;width:${big?68:56}px;height:${big?32:28}px;border-radius:4px;background:${big?'linear-gradient(135deg,#2E8B2E,#1A5C1A)':'linear-gradient(135deg,#3DAA3D,#237A23)'};border:1px solid rgba(255,255,255,.3);font-size:${big?13:11}px;color:rgba(255,255,255,.9)`;
      el.textContent=`$${big?'100':'1'}`;
    }
    container.appendChild(el);
  }
  setTimeout(()=>container.innerHTML='',5000);
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadJobs();
renderDash();
</script>
